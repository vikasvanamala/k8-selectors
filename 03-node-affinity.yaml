apiVersion: v1
kind: Pod 
metadata:
  name: nodeaffinity-demo
  labels:
    purpose: nodeaffinity
    project: roboshop
spec:
  # hard rule
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: disktype
            operator: In
            values:
            - ssd  
        #- matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values:
            - us-east-1b
  # soft rule
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 1
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - amazon
      - weight: 10
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - roboshop
  containers:
  - name: nginx
    image: nginx:latest
    imagePullPolicy: Always