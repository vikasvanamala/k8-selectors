apiVersion: v1
kind: Pod 
metadata:
  name: pod1
  labels:
    app: pod1
spec: 
  containers:
  - name: nginx
    image: nginx
    imagePullPolicy: Always
---
apiVersion: v1
kind: Pod 
metadata:
  name: pod2
  labels:
    app: pod2
spec: 
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - pod1
        topologyKey: "topology.kubernetes.io/zone"
  containers:
  - name: nginx
    image: nginx
    imagePullPolicy: Always
